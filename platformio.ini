[env:esp32dev]
platform = espressif32
board = esp32doit-devkit-v1
framework = arduino
monitor_speed = 115200
upload_speed = 115200

; Single 3MB app partition (no OTA fallback slot) instead of the default
; two 1.25MB slots, in exchange for much more headroom for future
; features. Existing OTA safety checks (size + magic-byte validation in
; otaupdate.h) still catch bad files before flashing even starts - what's
; lost is the automatic bootloader fallback if a *passing* update turns
; out to be broken once running. Recovery in that case is a USB reflash,
; not automatic. Also shrinks LittleFS from 1408KB to 896KB.
board_build.partitions = huge_app.csv

lib_deps =
    marcoschwartz/LiquidCrystal_I2C
    WebServer
    tobozo/ESP32-targz
    marian-craciunescu/ESP32Ping

build_flags =
    -DCORE_DEBUG_LEVEL=0
    -mtext-section-literals
    -DDEST_FS_USES_LITTLEFS
    -DMINIZ_NO_STDIO
    -DMINIZ_NO_ZLIB_APIS
