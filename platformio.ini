[env:esp32dev]
platform = espressif32
board = esp32doit-devkit-v1
framework = arduino
monitor_speed = 115200
upload_speed = 115200

lib_deps =
    marcoschwartz/LiquidCrystal_I2C
    WebServer
    tobozo/ESP32-targz
    marian-craciunescu/ESP32Ping

build_flags =
    -DCORE_DEBUG_LEVEL=0
    -mtext-section-literals
    -DDEST_FS_USES_LITTLEFS
    -DMINIZ_NO_STDIO
    -DMINIZ_NO_ZLIB_APIS
