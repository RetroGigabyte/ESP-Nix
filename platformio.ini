[env:esp32dev]
platform = espressif32
board = esp32doit-devkit-v1
framework = arduino
monitor_speed = 115200
upload_speed = 115200

; Two 1.875MB OTA slots (up from the default's 1.25MB each) instead of
; a single big slot. IMPORTANT: a single app0 partition (e.g. huge_app.csv)
; breaks Update-library OTA entirely, not just its rollback safety net -
; Update.begin() needs a genuinely separate partition to write into while
; the current one keeps executing; with only one slot it ends up writing
; over actively-running code and crashes. This scheme keeps two real
; slots. Trade-off: LittleFS shrinks to 128KB (from 1408KB default).
board_build.partitions = min_spiffs.csv

lib_deps =
    marcoschwartz/LiquidCrystal_I2C
    WebServer
    tobozo/ESP32-targz
    marian-craciunescu/ESP32Ping

build_flags =
    -DCORE_DEBUG_LEVEL=0
    -mtext-section-literals
    -DDEST_FS_USES_LITTLEFS
    -DMINIZ_NO_STDIO
    -DMINIZ_NO_ZLIB_APIS

; First S3 board (MAIN role in the multi-chip build, see goals.md) - same
; source tree as esp32dev above, just a different target chip. Not yet
; MAIN-specific behavior (keyboard OTG, SPI links to CPU/GPU) - this is
; just proving today's existing firmware builds and runs on the S3 at all.
[env:main-s3]
platform = espressif32
; NOT esp32-s3-devkitc-1 - that board manifest is literally named
; "Espressif ESP32-S3-DevKitC-1-N8 (8 MB QD, No PSRAM)" and never defines
; -DBOARD_HAS_PSRAM, the actual compile-time flag the Arduino core checks
; before initializing PSRAM at all - explains why PSRAM stayed silently
; undetected (ESP.getPsramSize() == 0) no matter what memory_type was set
; to, since the underlying board template assumed no PSRAM chip exists.
; rymcu-esp32-s3-devkitc-1 is otherwise the same S3 devkit pinout, but
; does define -DBOARD_HAS_PSRAM in its board manifest.
board = rymcu-esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
; Bumped from 115200 - this board connects over native USB CDC, not a real
; physical UART bridge chip, so it isn't subject to the same baud-rate
; reliability limits an actual UART chip would have. If uploads start
; failing/timing out at this speed, drop back to 460800 or 115200.
upload_speed = 921600
upload_port = /dev/cu.usbmodem5C4C1894951
monitor_port = /dev/cu.usbmodem5C4C1894951

board_build.psram = enabled
; rymcu-esp32-s3-devkitc-1's own manifest still says flash_mode=qio, but
; this board's real flash mode is confirmed DIO straight from its own ROM
; bootloader output ("mode:DIO, clock div:1" every boot) - overriding
; explicitly rather than trusting the board manifest's default here.
board_build.flash_mode = dio
; N16R8 module = 16MB flash + 8MB *octal* PSRAM. Flash mode is DIO (Dual
; I/O), not QIO - confirmed directly from this board's own ROM bootloader
; output ("mode:DIO, clock div:1" in the Serial monitor at every boot),
; not assumed. dio_opi = DIO flash + Octal PSRAM. Using qio_opi here
; first (wrong flash mode for this board) was why PSRAM stayed silently
; undetected (ESP.getPsramSize() returning 0) even with
; board_build.psram = enabled set.
board_build.arduino.memory_type = dio_opi
board_upload.flash_size = 16MB
; default_16MB.csv, not min_spiffs.csv - the latter is sized for a ~4MB
; flash chip (matching the WROOM-32E build above), which would leave ~12MB
; of this S3's actual 16MB flash unallocated and unused. default_16MB.csv
; keeps the same two-real-OTA-slots design (see the comment on the
; WROOM-32E env above for why that matters) but correctly sized: ~6.25MB
; per OTA slot and ~3.375MB LittleFS, instead of ~1.875MB/128KB.
board_build.partitions = default_16MB.csv

lib_deps =
    marcoschwartz/LiquidCrystal_I2C
    WebServer
    tobozo/ESP32-targz
    marian-craciunescu/ESP32Ping

build_flags =
    -DCORE_DEBUG_LEVEL=0
    -mtext-section-literals
    -DDEST_FS_USES_LITTLEFS
    -DMINIZ_NO_STDIO
    -DMINIZ_NO_ZLIB_APIS
